<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific | Dashboard v4.0 Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ajuste para móviles */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        .header-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 15px;
        }

        .scientist-profile { display: flex; align-items: center; gap: 15px; }

        .avatar-container {
            width: 80px; height: 80px; /* Tamaño reducido para móvil */
            flex-shrink: 0;
            border-radius: 50%; overflow: hidden;
            border: 2px solid var(--neon-blue);
        }

        #avatar-video { width: 100%; height: 100%; object-fit: cover; }

        .welcome-text h1 {
            font-family: 'Orbitron';
            font-size: 1.2rem;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Grid Responsivo Mejorado */
        .category-container {
            display: grid;
            gap: 20px;
        }

        .category-group {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; padding: 15px;
            border-left: 4px solid var(--neon-blue);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* Más compacto en móvil */
            gap: 10px;
        }

        .link-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem;
        }

        .link-card a { color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .link-card span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Media Query para Celulares Pequeños */
        @media (max-width: 480px) {
            .header-card { flex-direction: column; text-align: center; }
            .links-grid { grid-template-columns: 1fr 1fr; } /* Dos columnas en móviles */
            .welcome-text p { font-size: 0.8rem; }
        }

        /* Estilo del Modal Admin */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            justify-content: center; align-items: center; padding: 20px;
        }

        .modal-content {
            background: #1b2735; padding: 20px; border-radius: 15px;
            width: 100%; max-width: 400px; border: 1px solid var(--neon-blue);
        }

        input, select, button {
            width: 100%; padding: 10px; margin: 5px 0;
            border-radius: 5px; border: 1px solid var(--glass-border);
        }

        .btn-save { background: var(--neon-blue); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="scientist-profile">
            <div class="avatar-container">
                <video id="avatar-video" loop muted playsinline autoplay>
                    <source src="avatar.mp4" type="video/mp4">
                </video>
            </div>
            <div class="welcome-text">
                <h1>SCIENTIST HUB</h1>
                <p>Laboratorio Cloud v4.0</p>
            </div>
        </div>
        <button onclick="toggleModal()" style="width: auto; padding: 10px; background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);">
            <i class="fas fa-cog"></i>
        </button>
    </header>

    <div id="dynamic-grid" class="category-container"></div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--neon-blue); margin-bottom: 10px;">CONFIGURACIÓN CLOUD</h3>
        <input type="password" id="ghToken" placeholder="GitHub Personal Access Token">
        <input type="text" id="ghRepo" placeholder="Usuario/Repositorio (ej: gustabo/dashboard)">
        <hr style="margin: 15px 0; opacity: 0.2;">
        <input type="text" id="siteName" placeholder="Nombre">
        <input type="text" id="siteUrl" placeholder="URL">
        <input type="text" id="siteCat" placeholder="Categoría">
        <select id="siteIcon">
            <option value="fa-brain">IA</option>
            <option value="fa-users">Personal</option>
            <option value="fa-database">Data</option>
        </select>
        
        <button class="btn-save" onclick="saveToGitHub()">ACTUALIZAR EN GITHUB</button>
        <button onclick="toggleModal()" style="background: #333; color: white;">CERRAR</button>
        <p style="font-size: 0.7rem; margin-top: 10px; opacity: 0.5;">* Al guardar, el código se reescribirá en tu repositorio.</p>
    </div>
</div>

<script>
    // --- LOS DATOS ESTÁN AQUÍ ABAJO (SE REESCRIBIRÁN AUTOMÁTICAMENTE) ---
    const myPages = [
        { name: "Consensus", url: "https://consensus.app/", cat: "Investigación", icon: "fa-brain" },
        { name: "Perplexity", url: "https://www.perplexity.ai/", cat: "Investigación", icon: "fa-magnifying-glass" },
        { name: "Gp:Asistencia", url: "https://confianzaseguridad772-max.github.io/Asistencia/", cat: "MIPES", icon: "fa-users" }
    ];

    function renderDashboard() {
        const grid = document.getElementById('dynamic-grid');
        grid.innerHTML = '';
        const categories = [...new Set(myPages.map(p => p.cat))];

        categories.forEach(category => {
            const section = document.createElement('div');
            section.className = 'category-group';
            section.innerHTML = `<h2 style="font-size: 1rem; color: var(--neon-blue); margin-bottom: 10px;">${category}</h2><div class="links-grid" id="cat-${category.replace(/\s+/g, '')}"></div>`;
            grid.appendChild(section);

            const catGrid = document.getElementById(`cat-${category.replace(/\s+/g, '')}`);
            myPages.filter(p => p.cat === category).forEach((page, idx) => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.innerHTML = `<a href="${page.url}" target="_blank"><i class="fas ${page.icon}"></i><span>${page.name}</span></a>`;
                catGrid.appendChild(card);
            });
        });
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    async function saveToGitHub() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value; // Formato: usuario/repo
        const name = document.getElementById('siteName').value;
        const url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;

        if (!token || !repo) return alert("Falta Token o Repositorio");

        // Añadir nuevo link al array actual
        if (name && url && cat) {
            myPages.push({ name, url, cat, icon });
        }

        // Obtener el contenido actual del archivo index.html para conseguir el SHA (necesario para GitHub)
        const path = "index.html"; // Asegúrate de que tu archivo se llame así
        const apiUrl = `https://api.github.com/repos/${repo}/contents/${path}`;

        try {
            const res = await fetch(apiUrl, { headers: { Authorization: `token ${token}` } });
            const data = await res.json();
            const sha = data.sha;

            // Generar el nuevo contenido del archivo
            let currentContent = document.documentElement.outerHTML;
            // Reemplazar el array myPages antiguo por el nuevo en el texto del código
            const newArrayStr = `const myPages = ${JSON.stringify(myPages, null, 4)};`;
            const updatedCode = currentContent.replace(/const myPages = \[[\s\S]*?\];/, newArrayStr);

            // Subir a GitHub
            const commit = await fetch(apiUrl, {
                method: "PUT",
                headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Update dashboard links via Web Admin",
                    content: btoa(unescape(encodeURIComponent(updatedCode))), // Codificar a Base64 correctamente
                    sha: sha
                })
            });

            if (commit.ok) {
                alert("¡Guardado en la nube! GitHub tardará 1-2 minutos en actualizar la web.");
                location.reload();
            } else {
                alert("Error al subir. Revisa el token y permisos.");
            }
        } catch (e) {
            console.error(e);
            alert("Error de conexión con GitHub.");
        }
    }

    window.onload = renderDashboard;
</script>
</body>
</html>
