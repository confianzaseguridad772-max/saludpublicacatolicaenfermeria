<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Salud Pública - PUCP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <header>
            <div class="badge">ENFERMERÍA PUCP</div>
            <h1>Simulador de Epidemiología Histórica</h1>
            <div class="progress-wrapper">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </header>

        <main id="quiz-app">
            <div id="question-container" class="active">
                <h2 id="question-title">Cargando...</h2>
                <div id="answer-buttons" class="btn-grid"></div>
            </div>

            <div id="result-container" class="hidden">
                <div class="avatar-box">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&accessories=glassRound&clothing=overall&clothingColor=003a70&top=shortHair" alt="Avatar Enfermería" class="avatar-img">
                </div>
                <h2>Resultado de la Evaluación</h2>
                <div class="score-display">
                    <span id="score-num">0</span><small>/20</small>
                </div>
                <p id="feedback-text"></p>
                <button onclick="location.reload()" class="btn-restart">Intentar de nuevo</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
