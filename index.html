<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM Scientific Hub | Cloud Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-main: #f0f0f0;
            --bg-dark: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #0f172a 0%, var(--bg-dark) 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* --- Header con Avatar --- */
        .header-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 18px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .profile { display: flex; align-items: center; gap: 15px; }
        .avatar-ring {
            width: 60px; height: 60px;
            border-radius: 50%; padding: 2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
        }
        .avatar-box { 
            width: 100%; height: 100%; border-radius: 50%; 
            overflow: hidden; background: #000; cursor: pointer;
            position: relative;
        }
        #avatar-video { width: 100%; height: 100%; object-fit: cover; }

        .title-box h1 {
            font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- Grid de Categorías --- */
        .category-wrapper {
            margin-bottom: 15px; border-radius: 18px; overflow: hidden;
            border: 1px solid var(--glass-border); background: var(--glass);
        }

        .category-header {
            padding: 18px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background: rgba(255,255,255,0.03);
        }

        .category-title {
            font-family: 'Orbitron'; font-size: 0.85rem; color: var(--neon-blue);
            display: flex; align-items: center; gap: 10px;
        }

        .chevron { transition: transform 0.4s; opacity: 0.5; }
        .category-wrapper.active .chevron { transform: rotate(180deg); opacity: 1; }

        .category-content {
            display: none; padding: 15px;
            grid-template-columns: repeat(2, 1fr); gap: 12px;
            border-top: 1px solid var(--glass-border);
        }
        .category-wrapper.active .category-content { display: grid; }

        /* --- Botones --- */
        .link-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px; padding: 16px;
            text-align: center; border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .link-card:active { transform: scale(0.95); background: rgba(255,255,255,0.1); border-color: var(--neon-blue); }

        .link-card a { text-decoration: none; color: white; display: block; }
        .link-card i.main-icon { 
            font-size: 1.6rem; margin-bottom: 8px; color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        .link-card span { font-size: 0.75rem; font-weight: 400; display: block; opacity: 0.9; }

        /* --- FAB y Modal --- */
        .fab {
            position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,210,255,0.3);
            border: none; color: white; font-size: 1.2rem; cursor: pointer; z-index: 100;
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }

        .modal-content {
            background: #0f172a; width: 100%; max-width: 400px;
            padding: 30px; border-radius: 24px; border: 1px solid var(--neon-blue);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
        }

        input, select {
            width: 100%; padding: 14px; margin-bottom: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; font-family: 'Poppins';
        }

        .save-btn {
            background: var(--neon-blue); color: #000; font-weight: 700;
            border: none; padding: 15px; border-radius: 12px; width: 100%;
            cursor: pointer; transition: 0.3s;
        }
        .save-btn:disabled { opacity: 0.5; }

        #loading { text-align: center; padding: 40px; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="profile">
            <div class="avatar-ring">
                <div class="avatar-box" onclick="handleAvatarInteraction()">
                    <video id="avatar-video" loop muted playsinline autoplay>
                        <source src="avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="title-box">
                <h1>GOM SCIENTIFIC</h1>
                <p style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 1.5px;">DATABASE CONNECTED</p>
            </div>
        </div>
        <i class="fas fa-microchip" style="color: var(--neon-blue); opacity: 0.8;"></i>
    </header>

    <div id="loading"><i class="fas fa-atom fa-spin"></i> SINCRONIZANDO NUBE...</div>
    <div id="dynamic-grid"></div>
</div>

<button class="fab" onclick="toggleModal()"><i class="fas fa-plus"></i></button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 20px; text-align: center; color: var(--neon-blue);">NUEVO ACCESO</h2>
        <input type="text" id="siteName" placeholder="Nombre (Ej: Perplexity)">
        <input type="text" id="siteUrl" placeholder="URL (www.ejemplo.com)">
        <input type="text" id="siteCat" placeholder="Categoría (Ej: Salud)">
        <select id="siteIcon">
            <option value="fa-flask-vial">Laboratorio</option>
            <option value="fa-stethoscope">Salud</option>
            <option value="fa-brain">IA / Cerebro</option>
            <option value="fa-users-gear">Gestión</option>
            <option value="fa-globe">Web</option>
        </select>
        <button id="btnSave" class="save-btn" onclick="saveToExcel()">VINCULAR AHORA</button>
        <button onclick="toggleModal()" style="background:transparent; color:white; width:100%; margin-top:15px; border:none; opacity:0.5;">Cerrar</button>
    </div>
</div>

<audio id="avatar-audio"><source src="avatar.mp3" type="audio/mp3"></audio>

<script>
    // URL DE TU NUEVO SCRIPT DE GOOGLE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5kw2ObPz_0xmXArSbNlNnJC54Zx58s-rk4hZy6rmFDibUfD4hBLlGX8YGZmtFzoq3Ew/exec";

    async function loadDashboard() {
        const grid = document.getElementById('dynamic-grid');
        const loading = document.getElementById('loading');
        
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            loading.style.display = 'none';
            grid.innerHTML = '';

            const categories = [...new Set(data.map(p => p.cat))];

            categories.forEach(category => {
                const wrapper = document.createElement('div');
                wrapper.className = 'category-wrapper active';
                const catId = category.replace(/\s+/g, '');
                
                wrapper.innerHTML = `
                    <div class="category-header" onclick="this.parentElement.classList.toggle('active')">
                        <div class="category-title"><i class="fas fa-folder-open"></i> ${category}</div>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="category-content" id="cat-${catId}"></div>
                `;
                grid.appendChild(wrapper);

                const contentBox = document.getElementById(`cat-${catId}`);
                data.filter(p => p.cat === category).forEach(page => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    card.innerHTML = `
                        <a href="${page.url}" target="_blank">
                            <i class="fas ${page.icon} main-icon"></i><br>
                            <span>${page.name}</span>
                        </a>
                    `;
                    contentBox.appendChild(card);
                });
            });
        } catch (e) {
            loading.innerHTML = "❌ Error al conectar con el Excel.";
        }
    }

    async function saveToExcel() {
        const name = document.getElementById('siteName').value;
        let url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;
        const btn = document.getElementById('btnSave');

        if (name && url && cat) {
            if (!url.startsWith('http')) url = 'https://' + url;
            
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> PROCESANDO...";

            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&cat=${encodeURIComponent(cat)}&icon=${encodeURIComponent(icon)}`;

            try {
                await fetch(finalUrl, { mode: 'no-cors' });
                alert("✅ Sincronizado con el Excel.");
                location.reload();
            } catch (e) {
                alert("Error al guardar.");
                btn.disabled = false;
            }
        }
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    function handleAvatarInteraction() {
        const audio = document.getElementById('avatar-audio');
        if(audio.paused) audio.play();
        else { audio.pause(); audio.currentTime = 0; }
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
