<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM Hub | Gestión Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --bg-dark: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at center, #0f172a 0%, var(--bg-dark) 100%); font-family: 'Poppins', sans-serif; color: #fff; min-height: 100vh; padding-bottom: 100px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* Header & Avatar */
        .header-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .avatar-ring { width: 62px; height: 62px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); transition: transform 0.3s; }
        .avatar-ring:hover { transform: scale(1.1); }
        .avatar-box { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #000; cursor: pointer; }
        #avatar-video { width: 100%; height: 100%; object-fit: cover; }
        .title-box h1 { font-family: 'Orbitron'; font-size: 1.1rem; background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Contenedores Dinámicos */
        .category-wrapper { margin-bottom: 15px; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: var(--glass); transition: 0.3s; }
        .category-wrapper.active { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,210,255,0.1); }
        .category-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.03); }
        .category-title { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--neon-blue); display: flex; align-items: center; gap: 10px; }
        
        .category-content { display: none; padding: 15px; grid-template-columns: repeat(2, 1fr); gap: 12px; border-top: 1px solid var(--glass-border); }
        .category-wrapper.active .category-content { display: grid; }

        /* Link Cards */
        .link-card { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 18px; text-align: center; position: relative; border: 1px solid transparent; transition: 0.2s; }
        .link-card:active { transform: scale(0.95); }
        .link-card a { text-decoration: none; color: white; display: block; }
        .link-card i.main-icon { font-size: 1.7rem; margin-bottom: 8px; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        .link-card span { font-size: 0.75rem; font-weight: 300; display: block; }

        /* Acciones */
        .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; opacity: 0; transition: 0.3s; }
        .link-card:hover .card-actions { opacity: 1; }
        .action-btn { background: rgba(0,0,0,0.3); border: none; color: white; width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; }
        .btn-del:hover { background: #ff4d4d; color: white; }

        /* Floating Button & Modal */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; font-size: 1.3rem; cursor: pointer; z-index: 1000; box-shadow: 0 10px 25px rgba(0,210,255,0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0f172a; width: 100%; max-width: 400px; padding: 30px; border-radius: 24px; border: 1px solid var(--neon-blue); box-shadow: 0 0 40px rgba(0,210,255,0.2); }
        
        /* MEJORA: Select con fondo negro */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            background: #000; 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            color: white; 
            font-family: 'Poppins';
            outline: none;
        }
        select option { background: #000; color: #fff; }
        input:focus, select:focus { border-color: var(--neon-blue); }

        .save-btn { background: var(--neon-blue); color: #000; font-weight: 700; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="profile">
            <div class="avatar-ring">
                <div class="avatar-box" onmouseenter="playAvatarSound()" onmouseleave="stopAvatarSound()">
                    <video id="avatar-video" loop muted playsinline autoplay>
                        <source src="avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="title-box">
                <h1>GOM SCIENTIFIC</h1>
                <p style="font-size: 0.6rem; opacity: 0.6; letter-spacing: 1px;">DATABASE CONNECTED</p>
            </div>
        </div>
        <i class="fas fa-satellite-dish" style="color: var(--neon-blue); font-size: 0.9rem;"></i>
    </header>

    <div id="loading" style="text-align: center; padding: 30px; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.7rem;">
        <i class="fas fa-spinner fa-spin"></i> CONECTANDO CON EXCEL...
    </div>
    
    <div id="dynamic-grid"></div>
</div>

<button class="fab" onclick="toggleModal()"><i class="fas fa-plus"></i></button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; font-size:0.9rem; text-align:center; margin-bottom:20px; color:var(--neon-blue);">NUEVO RECURSO</h2>
        <input type="text" id="siteName" placeholder="Nombre del sitio">
        <input type="text" id="siteUrl" placeholder="URL (ej: www.google.com)">
        <input type="text" id="siteCat" placeholder="Categoría (ej: MIPES, Salud...)">
        
        <select id="siteIcon">
            <option value="fa-users">👥 Grupos</option>
            <option value="fa-child">🧒 Niño</option>
            <option value="fa-heart-pulse">❤️ Salud</option>
            <option value="fa-church">⛪ Iglesia</option>
            <option value="fa-microscope">🔬 Investigación</option>
            <option value="fa-seedling">🌱 Desarrollo Infantil</option>
            <option value="fa-brain">🧠 Inteligencia Artificial</option>
            <option value="fa-video">🎥 Videos</option>
            <option value="fa-flask-vial">🧪 Laboratorio</option>
            <option value="fa-database">📊 Gestión de Datos</option>
            <option value="fa-briefcase-medical">🏥 Gestión Pública</option>
            <option value="fa-book-open-reader">📚 Biblioteca Digital</option>
            <option value="fa-car">🚗 Mantenimiento Vehicular</option>
            <option value="fa-globe">🌐 Recurso Web</option>
            <option value="fa-shield-halved">🛡️ Seguridad</option>
            <option value="fa-file-lines">📄 Documentos</option>
            <option value="fa-calendar-check">📅 Agenda</option>
            <option value="fa-laptop-code">💻 Desarrollo Web</option>
            <option value="fa-chart-pie">📈 Estadísticas</option>
        </select>

        <button id="btnSave" class="save-btn" onclick="saveToExcel()">SINCRONIZAR AHORA</button>
        <button onclick="toggleModal()" style="background:transparent; color:white; width:100%; margin-top:10px; border:none; opacity:0.4; font-size:0.7rem;">CERRAR</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvgDaKKcOVLyznXTeKkhtQRjcMPhOEjCkTasTwvDchbRuTm1ugQ3Z1jgMNpGvfaY5Cnw/exec";
    const video = document.getElementById('avatar-video');

    function playAvatarSound() {
        video.muted = false;
        video.currentTime = 0;
        video.play().catch(e => {});
    }

    function stopAvatarSound() { video.muted = true; }

    async function loadDashboard() {
        const grid = document.getElementById('dynamic-grid');
        const loading = document.getElementById('loading');
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            loading.style.display = 'none';
            grid.innerHTML = '';

            const categories = [...new Set(data.map(p => p.cat))];
            categories.forEach(cat => {
                const wrap = document.createElement('div');
                wrap.className = 'category-wrapper active';
                const catId = cat.replace(/\s+/g, '');
                wrap.innerHTML = `
                    <div class="category-header" onclick="this.parentElement.classList.toggle('active')">
                        <div class="category-title"><i class="fas fa-folder-open"></i> ${cat}</div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="category-content" id="cat-${catId}"></div>
                `;
                grid.appendChild(wrap);

                data.filter(p => p.cat === cat).forEach(page => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    card.innerHTML = `
                        <div class="card-actions">
                            <button class="action-btn btn-del" onclick="deletePage('${page.name}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <a href="${page.url}" target="_blank">
                            <i class="fas ${page.icon} main-icon"></i><br>
                            <span>${page.name}</span>
                        </a>
                    `;
                    document.getElementById(`cat-${catId}`).appendChild(card);
                });
            });
        } catch (e) { loading.innerHTML = "❌ ERROR DE CONEXIÓN"; }
    }

    async function saveToExcel() {
        const name = document.getElementById('siteName').value;
        let url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;
        const btn = document.getElementById('btnSave');

        if (name && url && cat) {
            if (!url.startsWith('http')) url = 'https://' + url;
            btn.disabled = true;
            btn.innerHTML = "ENVIANDO...";
            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&cat=${encodeURIComponent(cat)}&icon=${encodeURIComponent(icon)}`;
            await fetch(finalUrl, { mode: 'no-cors' });
            alert("✅ Guardado en la Nube.");
            location.reload();
        } else {
            alert("Completa todos los campos.");
        }
    }

    async function deletePage(name) {
        if (confirm(`¿Eliminar "${name}"?`)) {
            await fetch(`${SCRIPT_URL}?action=delete&name=${encodeURIComponent(name)}`, { mode: 'no-cors' });
            location.reload();
        }
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
