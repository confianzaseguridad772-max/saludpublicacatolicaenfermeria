<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Epidemiología | PUCP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-viewport">
        <nav class="game-header">
            <div class="player-info">
                <div class="avatar-mini">🩺</div>
                <span>ENFERMERÍA <strong>PUCP</strong></span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="icon">💰</span>
                    <span id="score-text">Puntos: 0</span>
                </div>
                <div id="q-badge" class="stat-item">Estación 1/10</div>
            </div>
        </nav>

        <main class="game-container">
            <div class="map-progress">
                <div id="progress-line" class="fill"></div>
            </div>

            <section id="quiz-screen" class="content-card">
                <h2 id="question-text">Iniciando misión...</h2>
                <div id="options-grid" class="options-stack"></div>
            </section>

            <section id="result-screen" class="content-card hidden">
                <div class="mission-header">¡MISIÓN CUMPLIDA!</div>
                <div class="final-avatar">🎓</div>
                <div class="grade-box">
                    <small>CALIFICACIÓN FINAL</small>
                    <div id="final-grade">20</div>
                </div>
                <p id="feedback-text"></p>
                <button onclick="location.reload()" class="btn-action">Nueva Partida</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
