<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific | Dashboard v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .scientist-profile {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* Avatar con Video Interactivo */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            background: #000;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-container:hover {
            transform: scale(1.1);
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(157, 80, 187, 0.6);
        }

        #avatar-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.1);
        }

        .welcome-text h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .category-container { display: grid; gap: 30px; }

        .category-group {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid var(--neon-blue);
            backdrop-filter: blur(5px);
        }

        .category-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .link-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .link-card i {
            font-size: 1.2rem;
            color: var(--neon-blue);
            width: 25px;
            text-align: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .pulse {
            position: absolute;
            width: 100%; height: 100%;
            background: inherit;
            border-radius: inherit;
            z-index: -1;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @media (max-width: 768px) {
            .header-card { flex-direction: column; text-align: center; }
            .scientist-profile { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="scientist-profile">
            <div class="avatar-container" onmouseover="playAvatar()" onmouseout="muteAvatar()">
                <video id="avatar-video" loop muted playsinline>
                    <source src="avatar.mp4" type="video/mp4">
                    Tu navegador no soporta videos.
                </video>
            </div>
            <div class="welcome-text">
                <h1>SCIENTIST HUB</h1>
                <p>Bienvenido al laboratorio digital. Tus herramientas están listas.</p>
            </div>
        </div>
    </header>

    <div id="dynamic-grid" class="category-container"></div>
</div>

<a href="https://wa.me/51956113989?text=Hola,%20solicito%20asistencia%20técnica" class="whatsapp-float" target="_blank">
    <div class="pulse"></div>
    <i class="fab fa-whatsapp" style="font-size: 24px;"></i>
    <span>CONTACTO DIRECTO</span>
</a>

<script>
    const video = document.getElementById('avatar-video');

    function playAvatar() {
        video.currentTime = 0; // Reinicia el video para que el saludo sea completo
        video.muted = false; 
        video.play().catch(e => console.log("Interacción requerida para audio"));
    }

    function muteAvatar() {
        video.muted = true;
    }

    // --- BASE DE DATOS DE PÁGINAS (Iconos corregidos para FontAwesome) ---
    const myPages = [
        { name: "Consensus", url: "https://consensus.app/", cat: "Investigación", icon: "fa-brain" },
        { name: "Perplexity", url: "https://www.perplexity.ai/", cat: "Investigación", icon: "fa-magnifying-glass" },
        { name: "VideoIA", url: "https://deevid.ai/es/ai-avatar/ai-avatar-video", cat: "Investigación", icon: "fa-video" },
        { name: "RemoverLogos", url: "https://online-video-cutter.com/es/remove-logo", cat: "Investigación", icon: "fa-eraser" },
        { name: "Gp:Asistencia", url: "https://confianzaseguridad772-max.github.io/Asistencia/", cat: "MIPES", icon: "fa-users" },
        { name: "Nómina Digital", url: "#", cat: "Administración", icon: "fa-file-invoice-dollar" },
        { name: "SPSS Statistics", url: "#", cat: "Herramientas", icon: "fa-chart-pie" },
        { name: "Google Scholar", url: "#", cat: "Herramientas", icon: "fa-graduation-cap" },
        { name: "Configuración PWA", url: "#", cat: "Desarrollo", icon: "fa-laptop-code" }
    ];

    function initDashboard() {
        const grid = document.getElementById('dynamic-grid');
        const categories = [...new Set(myPages.map(p => p.cat))];

        categories.forEach(category => {
            const section = document.createElement('div');
            section.className = 'category-group';
            section.innerHTML = `
                <h2 class="category-name">${category}</h2>
                <div class="links-grid" id="cat-${category.replace(/\s+/g, '')}"></div>
            `;
            grid.appendChild(section);

            const catGrid = document.getElementById(`cat-${category.replace(/\s+/g, '')}`);
            myPages.filter(p => p.cat === category).forEach(page => {
                const card = document.createElement('a');
                card.href = page.url;
                card.className = 'link-card';
                card.target = "_blank";
                card.innerHTML = `
                    <i class="fas ${page.icon}"></i>
                    <span>${page.name}</span>
                `;
                catGrid.appendChild(card);
            });
        });
    }

    window.onload = initDashboard;
</script>

</body>
</html>
