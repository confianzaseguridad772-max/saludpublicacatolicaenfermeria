<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.3;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* HEADER */
        .header-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .scientist-profile { display: flex; align-items: center; gap: 25px; }

        .avatar-container {
            width: 130px; height: 130px;
            background: #000; border-radius: 50%; overflow: hidden;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        #avatar-video { width: 100%; height: 100%; object-fit: cover; }

        .welcome-text h1 {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        /* BOTÓN ADMIN */
        .admin-trigger {
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron';
            transition: 0.3s;
        }

        .admin-trigger:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* GRID */
        .category-group {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; padding: 25px; margin-bottom: 30px;
            border-left: 5px solid var(--neon-blue);
            backdrop-filter: blur(5px);
        }

        .category-name {
            font-family: 'Orbitron'; color: var(--neon-blue);
            margin-bottom: 20px; text-transform: uppercase;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .link-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 18px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }

        .link-card a {
            color: white; text-decoration: none;
            display: flex; align-items: center; gap: 15px;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            border-color: var(--neon-blue);
        }

        .delete-btn {
            color: #ff4d4d; cursor: pointer; opacity: 0.6;
            transition: 0.3s; padding: 5px;
        }

        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: #1b2735; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 450px; border: 1px solid var(--neon-blue);
        }

        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #090a0f; border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; font-family: 'Poppins';
        }

        /* WHATSAPP */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #25d366; color: white; padding: 15px 25px;
            border-radius: 50px; text-decoration: none;
            display: flex; align-items: center; gap: 12px;
            font-weight: bold; z-index: 1000; transition: 0.3s;
        }

        .pulse {
            position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: inherit;
            z-index: -1; animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="scientist-profile">
            <div class="avatar-container" onmouseover="playAvatar()" onmouseout="muteAvatar()">
                <video id="avatar-video" loop muted playsinline>
                    <source src="avatar.mp4" type="video/mp4">
                </video>
            </div>
            <div class="welcome-text">
                <h1>SCIENTIST HUB</h1>
                <p>Bienvenido al laboratorio digital.</p>
            </div>
        </div>
        <button class="admin-trigger" onclick="toggleModal()">+ GESTIONAR</button>
    </header>

    <div id="dynamic-grid" class="category-container"></div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron'; color: var(--neon-blue); margin-bottom: 20px;">NUEVO RECURSO</h2>
        <input type="text" id="siteName" placeholder="Nombre de la página">
        <input type="text" id="siteUrl" placeholder="URL (https://...)">
        <input type="text" id="siteCat" placeholder="Categoría (Ej: Investigación)">
        <select id="siteIcon">
            <option value="fa-brain">Cerebro / IA</option>
            <option value="fa-magnifying-glass">Búsqueda</option>
            <option value="fa-video">Video / Multimedia</option>
            <option value="fa-users">Personal / Equipos</option>
            <option value="fa-file-invoice-dollar">Administración</option>
            <option value="fa-laptop-code">Desarrollo</option>
            <option value="fa-graduation-cap">Académico</option>
            <option value="fa-chart-pie">Estadística</option>
        </select>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="admin-trigger" style="flex: 1;" onclick="addLink()">GUARDAR</button>
            <button class="admin-trigger" style="flex: 1; border-color: #ff4d4d; color: #ff4d4d;" onclick="toggleModal()">CERRAR</button>
        </div>
    </div>
</div>

<a href="https://wa.me/51956113989" class="whatsapp-float" target="_blank">
    <div class="pulse"></div>
    <i class="fab fa-whatsapp" style="font-size: 24px;"></i>
    <span>CONTACTO DIRECTO</span>
</a>

<script>
    const video = document.getElementById('avatar-video');
    
    // 1. CARGAR DATOS (Si no hay nada en localStorage, carga los de por defecto)
    let defaultPages = [
        { name: "Consensus", url: "https://consensus.app/", cat: "Investigación", icon: "fa-brain" },
        { name: "Perplexity", url: "https://www.perplexity.ai/", cat: "Investigación", icon: "fa-magnifying-glass" },
        { name: "VideoIA", url: "https://deevid.ai/es/ai-avatar/ai-avatar-video", cat: "Investigación", icon: "fa-video" },
        { name: "Gp:Asistencia", url: "https://confianzaseguridad772-max.github.io/Asistencia/", cat: "MIPES", icon: "fa-users" }
    ];

    let myPages = JSON.parse(localStorage.getItem('scientific_links')) || defaultPages;

    function playAvatar() {
        video.currentTime = 0;
        video.muted = false;
        video.play().catch(e => {});
    }

    function muteAvatar() { video.muted = true; }

    function toggleModal() {
        const modal = document.getElementById('adminModal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function addLink() {
        const name = document.getElementById('siteName').value;
        const url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;

        if (name && url && cat) {
            myPages.push({ name, url, cat, icon });
            updateStorage();
            toggleModal();
            // Limpiar campos
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteCat').value = '';
        } else {
            alert("Por favor, completa todos los campos.");
        }
    }

    function deleteLink(index) {
        if (confirm("¿Seguro que quieres eliminar este acceso?")) {
            myPages.splice(index, 1);
            updateStorage();
        }
    }

    function updateStorage() {
        localStorage.setItem('scientific_links', JSON.stringify(myPages));
        renderDashboard();
    }

    function renderDashboard() {
        const grid = document.getElementById('dynamic-grid');
        grid.innerHTML = '';
        
        const categories = [...new Set(myPages.map(p => p.cat))];

        categories.forEach(category => {
            const section = document.createElement('div');
            section.className = 'category-group';
            const catId = `cat-${category.replace(/\s+/g, '')}`;
            
            section.innerHTML = `
                <h2 class="category-name">${category}</h2>
                <div class="links-grid" id="${catId}"></div>
            `;
            grid.appendChild(section);

            const catGrid = document.getElementById(catId);
            
            myPages.forEach((page, index) => {
                if (page.cat === category) {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    card.innerHTML = `
                        <a href="${page.url}" target="_blank">
                            <i class="fas ${page.icon}"></i>
                            <span>${page.name}</span>
                        </a>
                        <i class="fas fa-trash-can delete-btn" onclick="deleteLink(${index})"></i>
                    `;
                    catGrid.appendChild(card);
                }
            });
        });
    }

    // Iniciar
    window.onload = renderDashboard;
</script>

</body>
</html>
