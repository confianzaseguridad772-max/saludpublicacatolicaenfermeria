<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enfermería PUCP | Epidemiología</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-screen">
        <div class="glass-card">
            <header>
                <div class="top-row">
                    <span class="pucp-tag">ENFERMERÍA <strong>PUCP</strong></span>
                    <span id="q-count" class="badge">1/10</span>
                </div>
                <h1>Simulador de Epidemiología Histórica</h1>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </header>

            <main id="quiz-box">
                <h2 id="question-text">Cargando...</h2>
                <div id="options-grid" class="options-grid"></div>
            </main>

            <section id="results-box" class="hidden">
                <div class="avatar-frame">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Nurse&backgroundColor=003a70&clothingColor=ffffff&top=shortHair&accessories=glassRound" alt="PUCP" class="avatar-img">
                </div>
                <h3>Evaluación Finalizada</h3>
                <div class="score-display"><span id="final-grade">0.0</span><small>/20</small></div>
                <p id="feedback"></p>
                <button onclick="location.reload()" class="btn-main">Reiniciar Prueba</button>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
